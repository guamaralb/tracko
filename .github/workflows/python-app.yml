name: Python application

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "sqlite:///./tracko.db"
      TEST_DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: "ci-secret-key-not-used-in-production"
      ALGORITHM: "HS256"
      FIRST_ADMIN_USER_EMAIL: "admin@admin.com"
      FIRST_ADMIN_USER_NAME: "admin"
      FIRST_ADMIN_USER_password: "admin"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install

      - name: Lint
        run: poetry run ruff check

      - name: Run tests
        run: poetry run pytest -s -x --cov=tracko -vv
